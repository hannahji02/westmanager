<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEST HOCKEY 출석부 (코치)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#dceaf6;--bg-bottom:#f4f8fc;--ink:#1a2b3c;--muted:#6b7d8f;--line:#dce6ef;
    --card:#ffffff;--slate:#1e2b38;--slate-h:#2c3e4f;--blue:#2f7fd1;--blue-d:#1f5e9e;
    --sky:#bcdcf3;--sky-soft:#eaf3fb;--pink:#ff5b86;--green:#1f9d6b;--red:#d35a4f;--amber:#d68910;--r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"Noto Sans KR",-apple-system,"Segoe UI","Malgun Gothic",sans-serif;
    background:linear-gradient(180deg,var(--bg-top) 0%,var(--bg-bottom) 300px) no-repeat,var(--bg-bottom);
    min-height:100vh;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:620px;margin:0 auto;padding:18px 16px 60px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;color:var(--slate)}
  .puck{width:20px;height:20px;border-radius:50%;background:var(--slate)}
  .conn{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px}
  .conn.ok{background:#e6f5ee;color:var(--green)}.conn.bad{background:#fdeceb;color:var(--red)}.conn.wait{background:#fcf3e2;color:var(--amber)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(31,94,158,.05)}
  .card h2{font-size:14px;color:var(--slate);margin-bottom:10px}
  .lbl{font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:6px}
  select,input{font:inherit;padding:10px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;width:100%;background:#fff}
  .sess-input{width:62px;text-align:center;font-weight:800;padding:7px}
  .ddl{font-size:14px}
  .train-meta{font-size:12px;color:var(--muted);margin-top:8px}
  .att-row{display:flex;align-items:center;gap:10px;padding:12px 6px;border-bottom:1px solid var(--line)}
  .att-row:last-child{border-bottom:0}
  .att-row .nm{flex:1;font-weight:700;font-size:14.5px;color:var(--slate)}
  .att-row .nm .sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
  .att-row .sess{font-size:12px;font-weight:800;color:var(--blue-d);min-width:54px;text-align:right}
  .att-row .sess.zero{color:var(--red)}
  .att-row.present{background:var(--sky-soft);border-radius:10px}
  .chkbtn{border:1.5px solid var(--line);background:#fff;color:var(--muted);font-size:13px;font-weight:800;padding:8px 14px;border-radius:10px;cursor:pointer;white-space:nowrap}
  .chkbtn.on{background:var(--green);color:#fff;border-color:var(--green)}
  .adj{display:flex;gap:4px}
  .adj button{width:30px;height:30px;border:1.5px solid var(--line);background:#fff;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;color:var(--slate)}
  .adj button:hover{border-color:var(--blue)}
  #att-list:not(.fixmode) .adj{display:none}
  #att-list:not(.fixmode) .sess{display:none}
  .fix-toggle{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--muted)}
  .fix-toggle button{border:1.5px solid var(--line);background:#fff;color:var(--muted);font-size:12px;font-weight:800;padding:5px 12px;border-radius:20px;cursor:pointer}
  .fix-toggle button.on{background:var(--amber);color:#fff;border-color:var(--amber)}
  .tag{font-size:10px;font-weight:800;padding:1px 7px;border-radius:20px;background:var(--sky-soft);color:var(--blue-d);margin-left:6px}
  .tag.added{background:#fcf3d6;color:#8a6b16}
  .addbar{display:flex;gap:8px;margin-top:12px}
  .addbar select{flex:1}
  .addwrap{margin-top:14px;border-top:1px solid var(--line);padding-top:14px}
  .addwrap input{width:100%}
  .add-cand{margin-top:8px;display:flex;flex-direction:column;gap:5px;max-height:220px;overflow:auto}
  .add-cand .ci{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1.5px solid var(--line);border-radius:9px;cursor:pointer;font-size:14px;font-weight:700;color:var(--slate)}
  .add-cand .ci:hover{border-color:var(--blue);background:var(--sky-soft)}
  .add-cand .ci .plus{color:var(--blue);font-weight:800}
  .add-cand .none{font-size:12.5px;color:var(--muted);padding:8px 4px}
  .btn{background:var(--slate);color:#fff;border:0;padding:10px 16px;border-radius:11px;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap}
  .btn:hover{background:var(--slate-h)}
  .btn.ghost{background:#fff;color:var(--slate);border:1.5px solid var(--line)}
  .empty{text-align:center;padding:30px 12px;color:var(--muted);font-size:13px}
  .summary{display:flex;gap:14px;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:10px}
  .summary b{color:var(--slate)}
  .setup{background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px;max-width:600px;margin:40px auto;line-height:1.7;box-shadow:0 4px 20px rgba(31,94,158,.08)}
  .setup h2{font-size:18px;margin-bottom:12px;color:var(--slate)}.setup input{margin:6px 0 14px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--slate);color:#fff;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:.2s;z-index:200;pointer-events:none}
  .toast.show{opacity:1}
  .hint{font-size:12px;color:var(--muted)}
  .notice-strip{background:#fff8ec;border:1px solid #f3e2bf;color:#8a6516;font-size:11.5px;border-radius:10px;padding:9px 12px;margin-bottom:12px;line-height:1.5}
  .cal-head{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px}
  .cal-head button{border:0;background:none;color:var(--blue);font-size:18px;cursor:pointer;padding:4px 10px;font-weight:800}
  .cal-head .cal-ttl{font-size:15px;font-weight:800;color:var(--slate)}
  .grid7 table{width:100%;border-collapse:collapse;table-layout:fixed}
  .grid7 th{font-size:12px;font-weight:800;color:var(--slate);padding:6px 1px;text-align:center;width:14.28%}
  .grid7 td{vertical-align:top;padding:4px 2px;text-align:center;height:54px;font-size:12px;color:var(--muted);width:14.28%}
  .gcell{border-radius:8px;height:100%;padding-top:4px}
  .gcell.has{cursor:pointer}
  .gcell.has:hover{background:var(--sky-soft)}
  .gcell.sel{background:var(--sky);color:var(--slate)}
  .gcell .dnum{font-weight:700;color:var(--ink)}
  .gcell .gdot{width:8px;height:8px;border-radius:50%;background:var(--blue);margin:3px auto 0}
  .gcell.done .gdot{background:var(--green)}
  .cal-legend{display:flex;align-items:center;gap:7px;justify-content:center;font-size:11px;color:var(--muted);margin-top:10px;font-weight:600}
  .cal-legend .lgdot{width:8px;height:8px;border-radius:50%;background:var(--blue)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="puck"></span> WEST 출석부 <span class="hint" style="color:#9db6cc;font-weight:600">코치</span></div>
    <span class="conn wait" id="conn">연결 대기</span>
  </header>

  <div id="setup" class="setup" style="display:none">
    <h2>연결 설정 (최초 1회)</h2>
    <p class="hint" style="margin-bottom:14px">Project URL과 publishable key 입력.</p>
    <label class="hint" style="font-weight:700">Project URL</label>
    <input id="in-url" placeholder="https://xxxxx.supabase.co">
    <label class="hint" style="font-weight:700">publishable key</label>
    <input id="in-key" placeholder="sb_publishable_...">
    <button class="btn" onclick="saveConfig()" style="width:100%">연결</button>
  </div>

  <div id="main" style="display:none">
    <div class="notice-strip">출석 체크 시 해당 회원의 잔여 회차가 <b>1회 차감</b>됩니다. 체크를 해제하면 차감분이 복구됩니다. 정기 훈련만 차감 대상입니다.</div>

    <div class="card">
      <div class="cal-head">
        <button onclick="moveMonth(-1)">◀</button>
        <span class="cal-ttl" id="cal-title">2026.06</span>
        <button onclick="moveMonth(1)">▶</button>
      </div>
      <div class="grid7" id="cal-grid"></div>
      <div class="cal-legend"><span class="lgdot"></span>훈련 있는 날 · 날짜를 누르면 출석부가 열립니다</div>
    </div>

    <div class="card" id="att-card" style="display:none">
      <div class="train-meta" id="train-meta"></div>
      <div class="fix-toggle">회차 정정 모드 <button id="fix-btn" onclick="toggleFix()">OFF</button></div>
      <div class="summary" id="summary"></div>
      <div id="att-list"></div>
      <div class="addwrap">
        <input id="add-search" placeholder="이름으로 검색해 추가 투입" oninput="renderAddCandidates()" autocomplete="off">
        <div id="add-candidates" class="add-cand"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_URL='https://bmuakmcydirbntuscfxy.supabase.co';
const DEFAULT_KEY='sb_publishable_w9GONJJWa22vzTZtqQC3UA_ogb81j3A';
const WEEK=['일','월','화','수','목','금','토'];
let sb=null, games=[], members=[], curGame=null, viewMonth=new Date(2026,5,1);
let votes=[], attendance=[], roster=[], fixMode=false; // roster: 현재 화면 명단

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
function setConn(s,t){const c=document.getElementById('conn');c.className='conn '+s;c.textContent=t;}
function isTraining(t){return t==='훈련'||(t!=='GAME'&&t!=='특강'&&t!=='행사');}

function loadConfig(){const u=localStorage.getItem('sb_url')||DEFAULT_URL,k=localStorage.getItem('sb_key')||DEFAULT_KEY;if(u&&k)initClient(u,k);else document.getElementById('setup').style.display='block';}
function saveConfig(){const u=document.getElementById('in-url').value.trim().replace(/\/$/,''),k=document.getElementById('in-key').value.trim();if(!u||!k){alert('두 값 입력');return;}localStorage.setItem('sb_url',u);localStorage.setItem('sb_key',k);document.getElementById('setup').style.display='none';initClient(u,k);}
function initClient(u,k){
  if(typeof supabase==='undefined'||!supabase.createClient){setConn('bad','라이브러리 미로드');document.getElementById('setup').style.display='block';return;}
  try{sb=supabase.createClient(u,k);document.getElementById('main').style.display='block';loadBase();}
  catch(e){setConn('bad','연결 실패');alert('연결 실패: '+e.message);}
}

async function loadBase(){
  setConn('wait','불러오는 중…');
  const g=await sb.from('games').select('*').eq('published',true).order('game_date',{ascending:false});
  const m=await sb.from('members').select('*').eq('status','active').order('name');
  if(g.error||m.error){setConn('bad','오류');return;}
  setConn('ok','연결됨 ✓');
  games=(g.data||[]).filter(x=>isTraining(x.event_type));
  members=m.data||[];
  // 가장 최근 훈련이 있는 달로 초기 이동
  if(games.length){const d=new Date(games[0].game_date+'T00:00:00');viewMonth=new Date(d.getFullYear(),d.getMonth(),1);}
  renderCalendar();
}

function moveMonth(d){viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+d,1);renderCalendar();}
function monthTrainings(){
  const y=viewMonth.getFullYear(),mo=viewMonth.getMonth();
  return games.filter(g=>{const d=new Date(g.game_date+'T00:00:00');return d.getFullYear()===y&&d.getMonth()===mo;});
}
async function renderCalendar(){
  document.getElementById('cal-title').textContent=`${viewMonth.getFullYear()}.${String(viewMonth.getMonth()+1).padStart(2,'0')}`;
  const ms=monthTrainings();
  const byDay={};ms.forEach(g=>{const dt=new Date(g.game_date+'T00:00:00').getDate();byDay[dt]=g;});
  // 이 달 훈련들의 출석 완료 여부 표시용: attendance에 present=true 1건이라도 있으면 done
  let doneSet=new Set();
  if(ms.length){
    const ids=ms.map(g=>g.id);
    const a=await sb.from('attendance').select('game_id,present').in('game_id',ids).eq('present',true);
    (a.data||[]).forEach(x=>doneSet.add(x.game_id));
  }
  const y=viewMonth.getFullYear(),mo=viewMonth.getMonth();
  const first=new Date(y,mo,1),last=new Date(y,mo+1,0);
  let cells=[];for(let i=0;i<first.getDay();i++)cells.push(null);
  for(let dt=1;dt<=last.getDate();dt++)cells.push(dt);
  let rows='';for(let i=0;i<cells.length;i+=7){
    rows+='<tr>'+Array.from({length:7},(_,j)=>{const dt=cells[i+j];if(!dt)return '<td></td>';
      const g=byDay[dt];
      if(!g)return `<td><div class="gcell"><div class="dnum">${dt}</div></div></td>`;
      const sel=curGame&&curGame.id===g.id?'sel':'';
      const done=doneSet.has(g.id)?'done':'';
      return `<td><div class="gcell has ${sel} ${done}" onclick="openAttendance(${g.id})"><div class="dnum">${dt}</div><div class="gdot"></div></div></td>`;
    }).join('')+'</tr>';
  }
  document.getElementById('cal-grid').innerHTML=`<table><thead><tr>${WEEK.map(w=>`<th>${w}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>`
    +(ms.length===0?'<div class="empty">이번 달 훈련 일정이 없습니다</div>':'');
}

async function openAttendance(gid){
  const card=document.getElementById('att-card');
  curGame=games.find(x=>String(x.id)===String(gid));
  if(!curGame){card.style.display='none';return;}
  const d=new Date(curGame.game_date+'T00:00:00');
  document.getElementById('train-meta').textContent=`${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}(${WEEK[d.getDay()]}) · ${curGame.game_time||'시간미정'} · ${curGame.place||'장소미정'}`;

  const v=await sb.from('votes').select('member_id,choice').eq('game_id',gid);
  const a=await sb.from('attendance').select('*').eq('game_id',gid);
  votes=v.data||[]; attendance=a.data||[];

  const participantIds=new Set(votes.filter(x=>x.choice==='참여'||x.choice==='출전').map(x=>x.member_id));
  const attById={}; attendance.forEach(x=>attById[x.member_id]=x);
  const ids=new Set([...participantIds, ...attendance.map(x=>x.member_id)]);
  roster=[...ids].map(id=>{
    const m=members.find(x=>x.id===id);
    if(!m)return null;
    const at=attById[id];
    return {member:m, source:participantIds.has(id)?'vote':'added', present:at?at.present:false, deducted:at?at.deducted:false};
  }).filter(Boolean).sort((a,b)=>a.member.name.localeCompare(b.member.name));

  card.style.display='block';
  renderCalendar(); // 선택 셀 하이라이트 갱신
  renderRoster();
  card.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderRoster(){
  const box=document.getElementById('att-list');
  if(roster.length===0){box.innerHTML='<div class="empty">참여 투표한 회원이 없습니다.<br>아래에서 직접 추가 투입하세요.</div>';}
  else{
    box.innerHTML=roster.map(r=>{
      const sess=r.member.remaining_sessions??0;
      return `<div class="att-row ${r.present?'present':''}">
        <div class="nm">${r.member.name}${r.member.jersey_no!=null?` <span class="hint">No.${r.member.jersey_no}</span>`:''}
          <span class="tag ${r.source==='added'?'added':''}">${r.source==='added'?'추가투입':'참여투표'}</span>
          <div class="sub">${r.present?'✓ 출석 · 1회 차감됨':'미체크'}</div>
        </div>
        <div class="adj">
          <button onclick="adjust(${r.member.id},-1)" title="회차 -1">−</button>
          <button onclick="adjust(${r.member.id},1)" title="회차 +1">＋</button>
        </div>
        <span class="sess ${sess<=0?'zero':''}">${sess}회</span>
        <button class="chkbtn ${r.present?'on':''}" onclick="togglePresent(${r.member.id})">${r.present?'출석 ✓':'출석'}</button>
      </div>`;
    }).join('');
  }
  // 추가 투입 후보 검색 렌더
  renderAddCandidates();
  // 요약
  const present=roster.filter(r=>r.present).length;
  document.getElementById('summary').innerHTML=`명단 <b>${roster.length}</b>명 · 출석 <b>${present}</b>명`;
  document.getElementById('att-list').classList.toggle('fixmode',fixMode);
}
function toggleFix(){
  fixMode=!fixMode;
  const b=document.getElementById('fix-btn');
  b.textContent=fixMode?'ON':'OFF';b.classList.toggle('on',fixMode);
  document.getElementById('att-list').classList.toggle('fixmode',fixMode);
}

// 출석 토글: 체크=차감, 해제=복구(그 체크로 깎인 경우만)
async function togglePresent(memberId){
  const r=roster.find(x=>x.member.id===memberId);if(!r)return;
  const m=r.member;
  if(!r.present){
    // 출석 처리 → 1 차감 (아직 차감 안 된 경우만)
    const newSess=(m.remaining_sessions??0)-1;
    const e1=await sb.from('members').update({remaining_sessions:newSess}).eq('id',m.id);
    if(e1.error){toast('차감 실패: '+e1.error.message);return;}
    // attendance upsert
    const e2=await sb.from('attendance').upsert({game_id:curGame.id,member_id:m.id,present:true,deducted:true,updated_at:new Date().toISOString()},{onConflict:'game_id,member_id'});
    if(e2.error){toast('출석 저장 실패: '+e2.error.message);return;}
    m.remaining_sessions=newSess; r.present=true; r.deducted=true;
    toast(`${m.name} 출석 · 1회 차감 (잔여 ${newSess})`);
  }else{
    // 해제 → 그 출석으로 차감했으면 +1 복구
    const wasDeducted=r.deducted;
    let newSess=m.remaining_sessions??0;
    if(wasDeducted){newSess=newSess+1;
      const e1=await sb.from('members').update({remaining_sessions:newSess}).eq('id',m.id);
      if(e1.error){toast('복구 실패: '+e1.error.message);return;}
    }
    const e2=await sb.from('attendance').upsert({game_id:curGame.id,member_id:m.id,present:false,deducted:false,updated_at:new Date().toISOString()},{onConflict:'game_id,member_id'});
    if(e2.error){toast('해제 저장 실패: '+e2.error.message);return;}
    m.remaining_sessions=newSess; r.present=false; r.deducted=false;
    toast(`${m.name} 출석 해제${wasDeducted?' · 1회 복구':''}`);
  }
  renderRoster();
  renderCalendar();
}

// 수동 회차 조정 (출석 토글과 별개)
async function adjust(memberId,delta){
  const r=roster.find(x=>x.member.id===memberId);if(!r)return;
  const m=r.member;
  const newSess=Math.max(0,(m.remaining_sessions??0)+delta);
  if(newSess===(m.remaining_sessions??0)){toast('변경 없음 (0 미만 불가)');return;}
  const {error}=await sb.from('members').update({remaining_sessions:newSess}).eq('id',m.id);
  if(error){toast('조정 실패: '+error.message);return;}
  m.remaining_sessions=newSess;
  toast(`${m.name} 회차 ${delta>0?'+':''}${delta} → ${newSess}회`);
  renderRoster();
}

function renderAddCandidates(){
  const box=document.getElementById('add-candidates');
  const q=(document.getElementById('add-search').value||'').trim();
  const inRoster=new Set(roster.map(r=>r.member.id));
  let cand=members.filter(m=>!inRoster.has(m.id));
  if(q) cand=cand.filter(m=>m.name.includes(q));
  if(!q){box.innerHTML='<div class="none">이름을 입력하면 후보가 표시됩니다.</div>';return;}
  if(cand.length===0){box.innerHTML='<div class="none">일치하는 회원이 없습니다 (이미 명단에 있을 수 있음).</div>';return;}
  box.innerHTML=cand.slice(0,30).map(m=>
    `<div class="ci" onclick="addMemberToList(${m.id})"><span>${m.name}${m.jersey_no!=null?` · No.${m.jersey_no}`:''}</span><span class="plus">＋ 추가</span></div>`
  ).join('');
}
function addMemberToList(id){
  const m=members.find(x=>String(x.id)===String(id));if(!m)return;
  if(roster.some(r=>r.member.id===m.id)){toast('이미 명단에 있습니다');return;}
  roster.push({member:m,source:'added',present:false,deducted:false});
  roster.sort((a,b)=>a.member.name.localeCompare(b.member.name));
  document.getElementById('add-search').value='';
  renderRoster();
  toast(`${m.name} 명단 추가 (출석 체크하면 차감)`);
}

window.addEventListener('load',loadConfig);
</script>
</body>
</html>
